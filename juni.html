<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Leading Indicator - Bank Muamalat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4b2e83;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
            --text-muted: #6c757d;
            --border: #e9ecef;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --radius: 8px;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --card-title-light: #d4c4f0; 
        }

        [data-theme="dark"] {
            --primary: #3a2266;
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #2a2a40;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; min-height: 100vh; }

        /* HEADER */
        .header { 
            background: linear-gradient(135deg, var(--primary), #2d1b50); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            position: relative;
            border-radius: 0 0 var(--radius) var(--radius); 
        }
        .header h1 { font-size: 1.4rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { font-size: 0.85rem; opacity: 0.9; margin: 2px 0; }
        
        .theme-toggle {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.3); }

        /* CONTROLS */
        .controls { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            background: var(--card-bg); 
            margin: 15px 20px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            gap: 10px; 
        }
        .filter-group { display: flex; gap: 10px; flex: 1; min-width: 0; }
        select { 
            padding: 8px 12px; border: 1px solid var(--border); 
            border-radius: 4px; flex: 1; background: var(--card-bg); 
            color: var(--text); min-width: 0;
        }
        
        .btn { 
            padding: 8px 16px; border: none; border-radius: 4px; 
            cursor: pointer; font-weight: 600; font-size: 0.85rem; 
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; 
        }
        .btn-reset { background: var(--text-muted); color: white; }
        .btn-ranking { background: var(--warning); color: #333; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* DASHBOARD GRID */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 15px; padding: 0 20px; 
        }

        .card { 
            background: var(--card-bg); padding: 16px; 
            border-radius: var(--radius); box-shadow: var(--shadow); 
            border-top: 4px solid var(--primary); display: flex; flex-direction: column;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        
        /* PERBAIKAN DARK THEME CARD TITLE */
        .card-title { 
            font-size: 0.95rem; font-weight: bold; 
            color: var(--primary); display: flex; align-items: center; gap: 6px; 
        }
        [data-theme="dark"] .card-title { color: var(--card-title-light); }

        .badge-mtd { font-size: 0.65rem; background: var(--border); padding: 2px 6px; border-radius: 4px; color: var(--text-muted); }
        
        .metric-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; color: var(--text-muted); }
        .metric-val { font-weight: 600; color: var(--text); }
        .metric-val.neg { color: var(--danger); }
        .metric-val.pos { color: var(--success); }

        .achievement-box { margin-top: auto; text-align: center; padding-top: 10px; border-top: 1px dashed var(--border); }
        .achv-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; }
        .achv-val { font-size: 1.3rem; font-weight: bold; margin-bottom: 6px; }
        .achv-val.red { color: var(--danger); }
        .achv-val.green { color: var(--success); }
        
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; width: 100%; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.5s ease; }
        .progress-fill.over { background: var(--success); }
        .progress-fill.under { background: var(--danger); }

        /* MODAL RANKING */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: var(--card-bg); width: 95%; max-width: 950px; 
            max-height: 90vh; border-radius: var(--radius); overflow: hidden; 
            display: flex; flex-direction: column; animation: slideUp 0.3s ease; color: var(--text);
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

        .ranking-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* TABLE WRAPPER & STYLING - PERBAIKAN TOTAL % FREEZE */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }
        
        .ranking-table { 
            width: 100%; border-collapse: separate; border-spacing: 0;
            font-size: 0.8rem; min-width: 800px; 
        }
        .ranking-table th { 
            background: var(--bg); padding: 10px 6px; text-align: center; 
            border-bottom: 2px solid var(--border); position: sticky; top: 0; 
            color: var(--text); white-space: nowrap; z-index: 10;
        }
        .ranking-table td { 
            padding: 10px 6px; border-bottom: 1px solid var(--border); 
            color: var(--text); text-align: center; white-space: nowrap;
            background: var(--card-bg); 
        }
        
        /* Sticky Columns Logic - FIXED WIDTH UNTUK AKURASI POSISI */
        
        /* 1. Rank (#) - Lebar Tetap 40px */
        .ranking-table th:first-child, 
        .ranking-table td:first-child { 
            position: sticky; left: 0; z-index: 20; 
            width: 40px; min-width: 40px; max-width: 40px;
            border-right: 1px solid var(--border);
        }
        
        /* 2. Branch Name - Lebar Tetap 120px (Desktop) / 100px (Mobile) */
        .ranking-table th:nth-child(2), 
        .ranking-table td:nth-child(2) { 
            position: sticky; left: 40px; z-index: 19; 
            width: 120px; min-width: 120px; max-width: 120px;
            text-align: left !important;
            border-right: 1px solid var(--border);
            overflow: hidden; text-overflow: ellipsis;
        }
        
        /* 3. Total Achv % - Sticky di 160px (40+120) Desktop / 140px Mobile */
        .ranking-table th:nth-child(3), 
        .ranking-table td:nth-child(3) {
            position: sticky; left: 160px; z-index: 18;
            font-weight: bold;
            background: rgba(75, 46, 131, 0.08); 
            border-right: 2px solid var(--primary); 
            width: 70px; min-width: 70px; max-width: 70px;
            font-size: 0.75rem;
        }

        .rank-badge { 
            display: inline-block; width: 22px; height: 22px; 
            line-height: 22px; text-align: center; border-radius: 50%; 
            font-weight: bold; font-size: 0.7rem; background: var(--border); 
        }
        .rank-1 { background: #ffd700; color: #333; }
        .rank-2 { background: #c0c0c0; color: #333; }
        .rank-3 { background: #cd7f32; color: white; }

        .footer { text-align: center; padding: 20px; font-size: 0.75rem; color: var(--text-muted); margin-top: 20px; }

        @media (max-width: 600px) {
            .controls { flex-wrap: wrap; }
            .filter-group { flex-basis: 100%; }
            .btn { flex: 1; justify-content: center; }
            .dashboard-grid { grid-template-columns: 1fr; }
            
            /* Penyesuaian Mobile Sticky Left */
            .ranking-table th:nth-child(2), .ranking-table td:nth-child(2) { 
                left: 40px; width: 100px; min-width: 100px; max-width: 100px;
            }
            .ranking-table th:nth-child(3), .ranking-table td:nth-child(3) {
                left: 140px; /* 40 + 100 */
                width: 60px; min-width: 60px; max-width: 60px;
                font-size: 0.65rem;
            }
            
            .ranking-table { font-size: 0.7rem; }
            .ranking-table th, .ranking-table td { padding: 8px 4px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <h1><i class="fas fa-university"></i> Bank Muamalat</h1>
        <p>Leading Indicator Dashboard 📍 Region Sumatera</p>
        <p>📅 Per: Juni 2026 | 📆 Hari Kerja: 20</p>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <div class="filter-group">
            <select id="coBranchFilter" onchange="handleCoBranchChange()">
                <option value="">Semua Co-Branch</option>
            </select>
            <select id="branchFilter" onchange="applyFilters()">
                <option value="">Semua Branch</option>
            </select>
        </div>
        <button class="btn btn-reset" onclick="resetFilters()"><i class="fas fa-sync-alt"></i> Reset Filter</button>
        <button class="btn btn-ranking" onclick="openRankingModal()"><i class="fas fa-trophy"></i> Ranking Performance</button>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="dashboard-grid" id="dashboardContainer">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
            <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Memuat data...
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        💡 Update data di bagian script HTML | 📱 Optimized for Mobile & Web | Theme: Light/Dark | Made by Love - RBPM
    </div>

    <!-- MODAL RANKING -->
    <div id="rankingModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-chart-bar"></i> Ranking Performance Detail</h3>
                <button class="close-btn" onclick="closeRankingModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="ranking-tabs">
                    <button class="tab-btn active" onclick="setRankingTab('all', this)">Semua Branch</button>
                    <button class="tab-btn" onclick="setRankingTab('co', this)">Per Co-Branch</button>
                </div>
                <div class="table-wrapper">
                    <table class="ranking-table" id="rankingTable">
                        <thead id="rankingThead"></thead>
                        <tbody id="rankingTableBody">
                            <tr><td colspan="100%" style="text-align:center; padding:20px;">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const metrics = [
            { key: 'ca', label: 'Current Account', icon: 'fa-wallet', type: 'Growth MTD', unit: 'M' },
            { key: 'sa', label: 'Saving Account', icon: 'fa-sack-dollar', type: 'Growth MTD', unit: 'M' },
            { key: 'fu', label: 'Funding', icon: 'fa-chart-line', type: 'Growth MTD', unit: 'M' },
            { key: 'con', label: 'Booking Consumer', icon: 'fa-users', type: 'Booking MTD', unit: 'M' },
            { key: 'sme', label: 'SME - Region', icon: 'fa-building', type: 'Booking MTD', unit: 'M' },
            { key: 'ph', label: 'Porsi Haji', icon: 'fa-kaaba', type: 'Booking MTD', unit: '' },
            { key: 'mdin', label: 'MDIN', icon: 'fa-mobile-alt', type: 'Akuisisi MTD', unit: '' },
            { key: 'qris', label: 'QRIS', icon: 'fa-qrcode', type: 'Akuisisi MTD', unit: '' },
            { key: 'sli', label: 'Sunlife (SLI)', icon: 'fa-umbrella', type: 'Booking MTD', unit: '' },
            { key: 'cif', label: 'New CIF', icon: 'fa-id-card', type: 'Akuisisi MTD', unit: '' }
        ];

        let rawData = [];
        let currentRankingMode = 'all';

        window.onload = async function() {
            initTheme();
            try {
                const res = await fetch('data_juni.json');
                if (!res.ok) throw new Error('File data_juni.json tidak ditemukan');
                rawData = await res.json();
                
                rawData = rawData.map(item => {
                    const clean = {};
                    Object.keys(item).forEach(k => {
                        const val = item[k];
                        clean[k.trim()] = (typeof val === 'string') ? val.trim() : val;
                    });
                    return clean;
                });

                populateCoBranchFilter();
                renderDashboard(rawData);
            } catch (err) {
                document.getElementById('dashboardContainer').innerHTML = 
                    `<div style="color:var(--danger); text-align:center; padding:20px;">Error: ${err.message}</div>`;
            }
        };

        function initTheme() {
            const saved = localStorage.getItem('bm_theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('themeIcon').className = 'fas fa-moon';
                localStorage.setItem('bm_theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').className = 'fas fa-sun';
                localStorage.setItem('bm_theme', 'dark');
            }
        }

        function populateCoBranchFilter() {
            const coSet = new Set(rawData.map(d => d['co']).filter(Boolean));
            const coSelect = document.getElementById('coBranchFilter');
            [...coSet].sort().forEach(co => {
                coSelect.innerHTML += `<option value="${co}">${co}</option>`;
            });
        }

        function handleCoBranchChange() {
            const coVal = document.getElementById('coBranchFilter').value;
            const brSelect = document.getElementById('branchFilter');
            brSelect.innerHTML = '<option value="">Semua Branch</option>';
            if (coVal) {
                const brSet = new Set(rawData.filter(d => d['co'] === coVal).map(d => d['br']).filter(Boolean));
                [...brSet].sort().forEach(br => { brSelect.innerHTML += `<option value="${br}">${br}</option>`; });
            }
            applyFilters();
        }

        function applyFilters() {
            const coVal = document.getElementById('coBranchFilter').value;
            const brVal = document.getElementById('branchFilter').value;
            let filtered = rawData;
            if (coVal) filtered = filtered.filter(d => d['co'] === coVal);
            if (brVal) filtered = filtered.filter(d => d['br'] === brVal);
            renderDashboard(filtered);
        }

        function resetFilters() {
            document.getElementById('coBranchFilter').value = "";
            document.getElementById('branchFilter').innerHTML = '<option value="">Semua Branch</option>';
            renderDashboard(rawData);
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboardContainer');
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--text-muted);">Tidak ada data.</div>';
                return;
            }

            const agg = {};
            metrics.forEach(m => { agg[m.key + '_mtd'] = 0; agg[m.key + '_tgt'] = 0; });
            data.forEach(row => {
                metrics.forEach(m => {
                    agg[m.key + '_mtd'] += parseFloat(row[m.key + '_mtd'] || 0);
                    agg[m.key + '_tgt'] += parseFloat(row[m.key + '_tgt'] || 0);
                });
            });

            metrics.forEach(m => {
                const mtd = agg[m.key + '_mtd'];
                const tgt = agg[m.key + '_tgt'];
                const gap = mtd - tgt;
                const achv = tgt !== 0 ? (mtd / tgt * 100) : 0;
                
                const isNegGrowth = (m.key === 'ca' || m.key === 'sa' || m.key === 'fu') && mtd < 0;
                const growthClass = isNegGrowth ? 'neg' : 'pos';
                const formattedMtd = (mtd > 0 && !isNegGrowth ? '+' : '') + mtd.toFixed(1) + (m.unit ? ' ' + m.unit : '');
                
                const achvColor = achv >= 100 ? 'green' : 'red';
                const barColor = achv >= 100 ? 'over' : 'under';
                const barWidth = Math.min(Math.max(achv, 0), 100);
                
                const formattedGap = (gap > 0 ? '+' : '') + gap.toFixed(1) + (m.unit ? ' ' + m.unit : '');
                const gapLabel = m.key === 'ca' || m.key === 'sa' || m.key === 'fu' ? 'GAP Growth' : 
                                 m.key === 'con' || m.key === 'sme' || m.key === 'ph' || m.key === 'sli' ? 'GAP Booking' : 'GAP Akuisisi';

                container.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title"><i class="fas ${m.icon}"></i> ${m.label}</span>
                            <span class="badge-mtd">MTD</span>
                        </div>
                        <div class="metric-row"><span>${m.type}</span><span class="metric-val ${growthClass}">${formattedMtd}</span></div>
                        <div class="metric-row"><span>Target MTD</span><span class="metric-val">+${tgt.toFixed(1)}${m.unit ? ' '+m.unit : ''}</span></div>
                        <div class="metric-row"><span>${gapLabel}</span><span class="metric-val ${gap >= 0 ? 'pos' : 'neg'}">${formattedGap}</span></div>
                        <div class="achievement-box">
                            <div class="achv-label">Achievement</div>
                            <div class="achv-val ${achvColor}">${achv.toFixed(1)}%</div>
                            <div class="progress-bar"><div class="progress-fill ${barColor}" style="width: ${barWidth}%"></div></div>
                        </div>
                    </div>`;
            });
        }

        function openRankingModal() {
            document.getElementById('rankingModal').style.display = 'flex';
            renderRanking();
        }
        function closeRankingModal() { document.getElementById('rankingModal').style.display = 'none'; }
        function setRankingTab(mode, btn) {
            currentRankingMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderRanking();
        }

        function getMetricValues(rowOrAgg, isAggregated) {
            const vals = {};
            metrics.forEach(m => {
                if (isAggregated) {
                    const mtd = rowOrAgg.mtd[m.key] || 0;
                    const tgt = rowOrAgg.tgt[m.key] || 0;
                    vals[m.key] = { mtd, tgt, achv: tgt !== 0 ? (mtd/tgt*100) : 0 };
                } else {
                    const mtd = parseFloat(rowOrAgg[m.key+'_mtd'] || 0);
                    const tgt = parseFloat(rowOrAgg[m.key+'_tgt'] || 0);
                    vals[m.key] = { mtd, tgt, achv: tgt !== 0 ? (mtd/tgt*100) : 0 };
                }
            });
            return vals;
        }

        function renderRanking() {
            const thead = document.getElementById('rankingThead');
            const tbody = document.getElementById('rankingTableBody');
            tbody.innerHTML = '<tr><td colspan="100%" style="text-align:center;">Memproses...</td></tr>';

            let groupedData = [];
            if (currentRankingMode === 'all') {
                groupedData = rawData.map(d => ({ name: d['br'], sub: d['co'], data: d, isAgg: false }));
            } else if (currentRankingMode === 'co') {
                const coMap = {};
                rawData.forEach(d => {
                    if (!coMap[d['co']]) coMap[d['co']] = { mtd: {}, tgt: {} };
                    metrics.forEach(m => {
                        coMap[d['co']].mtd[m.key] = (coMap[d['co']].mtd[m.key] || 0) + parseFloat(d[m.key+'_mtd']||0);
                        coMap[d['co']].tgt[m.key] = (coMap[d['co']].tgt[m.key] || 0) + parseFloat(d[m.key+'_tgt']||0);
                    });
                });
                groupedData = Object.keys(coMap).map(co => ({ name: co, sub: '', data: coMap[co], isAgg: true }));
            }

            const ranked = groupedData.map(g => {
                const mv = getMetricValues(g.data, g.isAgg);
                let totalMtd = 0, totalTgt = 0;
                metrics.forEach(m => { totalMtd += mv[m.key].mtd; totalTgt += mv[m.key].tgt; });
                return { ...g, metricVals: mv, totalAchv: totalTgt !== 0 ? (totalMtd/totalTgt*100) : 0 };
            }).sort((a,b) => b.totalAchv - a.totalAchv);

            let headerHTML = `<tr>
                <th>#</th>
                <th>${currentRankingMode === 'co' ? 'Co-Branch' : 'Branch'}</th>
                <th>Total %</th>`;
            metrics.forEach(m => { headerHTML += `<th title="${m.label}"><i class="fas ${m.icon}"></i></th>`; });
            headerHTML += `</tr>`;
            thead.innerHTML = headerHTML;

            tbody.innerHTML = '';
            ranked.forEach((r, i) => {
                const rank = i + 1;
                let badgeClass = 'rank-badge';
                if(rank===1) badgeClass += ' rank-1';
                else if(rank===2) badgeClass += ' rank-2';
                else if(rank===3) badgeClass += ' rank-3';

                const totalColor = r.totalAchv >= 100 ? 'var(--success)' : 'var(--danger)';
                
                let rowHTML = `<tr>
                    <td><span class="${badgeClass}">${rank}</span></td>
                    <td><strong>${r.name}</strong><br><small style="color:var(--text-muted)">${r.sub}</small></td>
                    <td style="color:${totalColor}; font-size:0.75rem;">${r.totalAchv.toFixed(1)}%</td>`;
                
                metrics.forEach(m => {
                    const v = r.metricVals[m.key];
                    const color = v.achv >= 100 ? 'var(--success)' : 'var(--danger)';
                    rowHTML += `<td style="color:${color}; font-size:0.7rem;">${v.achv.toFixed(0)}%</td>`;
                });
                rowHTML += `</tr>`;
                tbody.innerHTML += rowHTML;
            });
        }

        window.onclick = function(e) {
            const modal = document.getElementById('rankingModal');
            if (e.target == modal) closeRankingModal();
        }
    </script>
</body>
</html>
