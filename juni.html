<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Muamalat - Leading Indicator Dashboard</title>
    <!-- Font Awesome untuk Ikon Tombol -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ROOT VARIABLES (TEMA) --- */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --header-bg: linear-gradient(135deg, #4A148C, #7B1FA2);
            --header-text: #ffffff;
            --border-color: #dddddd;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --header-bg: linear-gradient(135deg, #2A085C, #4D1066);
            --header-text: #e0e0e0;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
        }

        /* --- HEADER STYLES --- */
        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            position: relative;
            margin-bottom: 25px; /* Jarak aman konstan saat filter disembunyikan */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* Wadah Tombol Aksi Kanan Atas (Desktop) */
        .header-action-container {
            position: absolute;
            top: 25px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .btn-toggle-filter, .theme-toggle {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: background 0.2s;
            outline: none;
        }

        .btn-toggle-filter:hover, .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* --- CONTROLS PANEL (FILTER) --- */
        .controls {
            display: flex; /* Default tampil menggunakan flex layout */
            flex-wrap: wrap;
            gap: 15px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.8;
        }

        .filter-group select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
        }

        /* --- CONTENT / DASHBOARD GRID GRID --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: background-color 0.3s, border-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* --- RESPONSIVE MEDIA QUERIES (MOBILE) --- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px 15px 15px 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .header h1 {
                font-size: 1.5rem;
                flex-direction: column;
                gap: 5px;
            }

            /* Solusi Utama Berdasarkan Masalah WhatsApp Image 2026-06-12 at 16.51.29.jpeg */
            .header-action-container {
                position: static; /* Melepas sistem absolute */
                margin-top: 15px;
                order: 3; /* Memaksa turun ke baris paling bawah di dalam kontainer header */
                justify-content: center;
                width: 100%;
            }

            .controls {
                flex-direction: column;
                gap: 12px;
            }

            .filter-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <!-- Wadah Tombol Aksi Sejajar -->
        <div class="header-action-container">
            <!-- Tombol Show/Hide Filter -->
            <button class="btn-toggle-filter" onclick="toggleFilterPanel()" title="Show/Hide Filter">
                <i class="fas fa-filter" id="filterIcon"></i>
            </button>
            <!-- Tombol Tema (Dark/Light Mode) -->
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>
        
        <h1>
            <img src="img/BMI.png" alt="Bank Muamalat Logo" class="logo" width="30" height="30" onerror="this.style.display='none'"> 
            Bank Muamalat
        </h1>
        <p>Leading Indicator Dashboard 📍 Region Sumatera</p>
        <p>📅 Per: 11 Juni 2026 | 📅 Workdays: 20</p>
    </div>

    <!-- PANEL FILTER (CONTROLS) -->
    <div class="controls" id="filterPanel">
        <div class="filter-group">
            <label for="filterRegion">Territory / Region</label>
            <select id="filterRegion">
                <option value="Sumatera">Region Sumatera</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filterLeader">Leader</label>
            <select id="filterLeader">
                <option value="all">All Leaders</option>
                <option value="leader1">Leader 1</option>
                <option value="leader2">Leader 2</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filterRM">Relationship Manager (RM)</label>
            <select id="filterRM">
                <option value="all">All RM</option>
                <option value="rm1">RM 1</option>
                <option value="rm2">RM 2</option>
            </select>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-grid">
        <div class="card">📈 Top 10 Booking Chart Component</div>
        <div class="card">📊 Performance Overview Grid</div>
        <div class="card">📋 Detailed Metric Breakdown</div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- 1. Fungsi Toggle Show/Hide Filter Panel ---
        function toggleFilterPanel() {
            const controlsPanel = document.getElementById('filterPanel');
            const filterIcon = document.getElementById('filterIcon');
            
            // Memeriksa status display saat ini
            if (controlsPanel.style.display === 'none') {
                controlsPanel.style.display = 'flex';
                filterIcon.className = 'fas fa-filter'; // Kembali ke ikon corong
            } else {
                controlsPanel.style.display = 'none';
                filterIcon.className = 'fas fa-eye-slash'; // Berubah jadi ikon mata dicoret saat sembunyi
            }
        }

        // --- 2. Fungsi Toggle Light/Dark Theme Mode ---
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const themeIcon = document.getElementById('themeIcon');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.className = 'fas fa-moon'; // Ikon bulan untuk mode terang
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.className = 'fas fa-sun'; // Ikon matahari untuk mode gelap
            }
        }
    </script>
</body>
</html>
