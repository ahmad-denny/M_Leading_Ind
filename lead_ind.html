<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Leading Indicator - Bank Muamalat</title>
  <style>
    :root {
      --primary: #0f172a;
      --secondary: #1e40af;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-light: #64748b;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --info: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 8px;
      line-height: 1.4;
      font-size: 14px;
    }
    .header {
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      text-align: center;
    }
    .header h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .header .subtitle { font-size: 0.85rem; opacity: 0.9; }
    .header .date { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }
    
    .filters {
      background: var(--card-bg);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .filters select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
    }
    .filter-label { font-size: 11px; color: var(--text-light); display: block; margin-bottom: 2px; }
    
    .summary-bar {
      background: var(--card-bg);
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      text-align: center;
      font-size: 0.8rem;
    }
    .summary-item .label { color: var(--text-light); display: block; }
    .summary-item .value { font-weight: 700; font-size: 1rem; }
    .summary-item .value.neg { color: var(--danger); }
    .summary-item .value.pos { color: var(--success); }
    
    .params-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
    }
    
    .param-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid var(--info);
    }
    .param-card.ca { border-left-color: #3b82f6; }
    .param-card.sa { border-left-color: #8b5cf6; }
    .param-card.fu { border-left-color: #06b6d4; }
    .param-card.con { border-left-color: #f59e0b; }
    .param-card.sme { border-left-color: #16a34a; }
    .param-card.ph { border-left-color: #ec4899; }
    .param-card.mdin { border-left-color: #6366f1; }
    .param-card.qris { border-left-color: #14b8a6; }
    .param-card.sli { border-left-color: #f97316; }
    .param-card.cif { border-left-color: #84cc16; }
    
    .param-card .title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .metric-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.85rem;
    }
    .metric-row .label { color: var(--text-light); }
    .metric-row .value { font-weight: 600; font-family: monospace; }
    .metric-row.gap .value.neg { color: var(--danger); font-weight: 700; }
    .metric-row.gap .value.pos { color: var(--success); font-weight: 700; }
    
    .achievement {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .achievement .label { font-size: 0.8rem; color: var(--text-light); }
    .achievement .value { font-size: 1.3rem; font-weight: 800; margin: 4px 0; }
    .achievement .value.low { color: var(--danger); }
    .achievement .value.mid { color: var(--warning); }
    .achievement .value.high { color: var(--success); }
    
    .progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    
    .footer { text-align: center; padding: 16px; color: var(--text-light); font-size: 0.75rem; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-left: 6px; }
    .tag.mtd { background: #dbeafe; color: #1e40af; }
    .tag.ytd { background: #fef3c7; color: #92400e; }
    
    @media (max-width: 600px) {
      .filters { grid-template-columns: 1fr; }
      .summary-bar { grid-template-columns: repeat(2, 1fr); }
      .params-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  const coBranchSelect = document.getElementById('coBranchFilter');
  const branchSelect = document.getElementById('branchFilter');

  // 🔄 CASCADING DROPDOWN LOGIC
  coBranchSelect.addEventListener('change', function() {
    updateBranchOptions(this.value);
    renderDashboard();
  });
  branchSelect.addEventListener('change', renderDashboard);

  function updateBranchOptions(selectedCo) {
    branchSelect.innerHTML = '<option value="ALL">Semua Branch</option>';
    const filtered = selectedCo === 'ALL' ? ntData : ntData.filter(d => d.co === selectedCo);
    const uniqueBranches = [...new Set(filtered.map(d => d.br))].sort();
    uniqueBranches.forEach(br => {
      const opt = document.createElement('option');
      opt.value = br;
      opt.textContent = br;
      branchSelect.appendChild(opt);
    });
    branchSelect.value = 'ALL'; // Reset ke ALL saat Co-Branch berubah
  }

  function calcMetrics(data) {
    return data.map(d => ({
      ...d,
      gapCA: d.ca_mtd - d.ca_tgt, gapSA: d.sa_mtd - d.sa_tgt, gapFU: d.fu_mtd - d.fu_tgt,
      gapCon: d.con_mtd - d.con_tgt, gapSME: d.sme_mtd - d.sme_tgt, gapPH: d.ph_mtd - d.ph_tgt,
      gapMDIN: d.mdin_mtd - d.mdin_tgt, gapQRIS: d.qris_mtd - d.qris_tgt, gapSLI: d.sli_mtd - d.sli_tgt,
      gapCIF: d.cif_mtd - d.cif_tgt,
      achCA: d.ca_tgt>0 ? (d.ca_mtd/d.ca_tgt*100) : 0, achSA: d.sa_tgt>0 ? (d.sa_mtd/d.sa_tgt*100) : 0,
      achFU: d.fu_tgt>0 ? (d.fu_mtd/d.fu_tgt*100) : 0, achCon: d.con_tgt>0 ? (d.con_mtd/d.con_tgt*100) : 0,

    let filtered = data;
    if(coBr!=='ALL') filtered = filtered.filter(d=>d.co===coBr);
    if(br!=='ALL') filtered = filtered.filter(d=>d.br===br);
    
    const sum = (key) => filtered.reduce((a,b)=>a+(b[key]||0),0);
    const count = filtered.length;
    const avg = (key) => count > 0 ? sum(key)/count : 0;

    return {
      ca_mtd:sum('ca_mtd'), ca_tgt:sum('ca_tgt'), gapCA:sum('gapCA'), achCA:avg('achCA'),
      sa_mtd:sum('sa_mtd'), sa_tgt:sum('sa_tgt'), gapSA:sum('gapSA'), achSA:avg('achSA'),
      fu_mtd:sum('fu_mtd'), fu_tgt:sum('fu_tgt'), gapFU:sum('gapFU'), achFU:avg('achFU'),
      con_mtd:sum('con_mtd'), con_tgt:sum('con_tgt'), gapCon:sum('gapCon'), achCon:avg('achCon'),
      sme_mtd:sum('sme_mtd'), sme_tgt:sum('sme_tgt'), gapSME:sum('gapSME'), achSME:avg('achSME'),
      ph_mtd:sum('ph_mtd'), ph_tgt:sum('ph_tgt'), gapPH:sum('gapPH'), achPH:avg('achPH'),
      mdin_mtd:sum('mdin_mtd'), mdin_tgt:sum('mdin_tgt'), gapMDIN:sum('gapMDIN'), achMDIN:avg('achMDIN'),
      qris_mtd:sum('qris_mtd'), qris_tgt:sum('qris_tgt'), gapQRIS:sum('gapQRIS'), achQRIS:avg('achQRIS'),
      sli_mtd:sum('sli_mtd'), sli_tgt:sum('sli_tgt'), gapSLI:sum('gapSLI'), achSLI:avg('achSLI'),
      cif_mtd:sum('cif_mtd'), cif_tgt:sum('cif_tgt'), gapCIF:sum('gapCIF'), achCIF:avg('achCIF')
    };
  }

  function formatNum(val, unit='') {
    if(unit==='M') return (val>=0?'+':'') + val.toFixed(1) + ' M';
    return val>=0 ? val.toLocaleString('id-ID') : '(' + Math.abs(val).toLocaleString('id-ID') + ')';
  }

  function getAchieveClass(pct) {
    if(pct >= 100) return 'high';
    if(pct >= 50) return 'mid';
    return 'low';
  }

  function renderDashboard() {
    const coBr = coBranchSelect.value;
    const br = branchSelect.value;
    
    const calculatedData = calcMetrics(ntData);
    const total = aggregate(calculatedData, coBr, br);
    const container = document.getElementById('paramsContainer');
    container.innerHTML = '';
    
    params.forEach(p => {
      const m0 = total[p.metrics[0].k], m1 = total[p.metrics[1].k], gap = total[p.metrics[2].k], ach = total[p.metrics[3].k];
      const gapClass = gap >= 0 ? 'pos' : 'neg';
      const achClass = getAchieveClass(ach);
      
      const card = document.createElement('div');
      card.className = `param-card ${p.color}`;
      card.innerHTML = `
        <div class="title">${p.name} <span class="tag mtd">MTD</span></div>
        <div class="metric-row"><span class="label">${p.metrics[0].l}</span><span class="value">${formatNum(m0,p.unit)}</span></div>
        <div class="metric-row"><span class="label">${p.metrics[1].l}</span><span class="value">${formatNum(m1,p.unit)}</span></div>
        <div class="metric-row gap"><span class="label">${p.metrics[2].l}</span><span class="value ${gapClass}">${formatNum(gap,p.unit)}</span></div>
        <div class="achievement">
          <span class="label">${p.metrics[3].l}</span>
          <div class="value ${achClass}">${ach.toFixed(1)}%</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,ach)}%; background:${ach>=100?'#16a34a':ach>=50?'#f59e0b':'#dc2626'}"></div></div>
        </div>
      `;
      container.appendChild(card);
    });
    
    document.getElementById('sumGapCA').textContent = formatNum(total.gapCA,'M');
    document.getElementById('sumGapCA').className = `summary-item value ${total.gapCA >= 0 ? 'pos' : 'neg'}`;
    document.getElementById('sumGapSA').textContent = formatNum(total.gapSA,'M');
    document.getElementById('sumGapSA').className = `summary-item value ${total.gapSA >= 0 ? 'pos' : 'neg'}`;
    document.getElementById('sumGapFU').textContent = formatNum(total.gapFU,'M');
    document.getElementById('sumGapFU').className = `summary-item value ${total.gapFU >= 0 ? 'pos' : 'neg'}`;
    
    const avgAch = (total.achCA+total.achSA+total.achFU+total.achCon+total.achSME+total.achPH+total.achMDIN+total.achQRIS+total.achSLI+total.achCIF)/10;
    document.getElementById('avgAchieve').textContent = avgAch.toFixed(1) + '%';
  }

  function exportReport() {
    alert("Fitur Export CSV/PDF bisa ditambahkan. Untuk sekarang, screenshot atau Print to PDF langsung dari browser sudah optimal.");
  }

  // Init
  updateBranchOptions('ALL');
  renderDashboard();
</script>
</body>
</html>
