<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Leading Indicator - Bank Muamalat</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif; background: var(--bg); color: var(--text); padding: 12px; line-height: 1.4; font-size: 14px; transition: background 0.3s ease, color 0.3s ease; }
    .filters { background: var(--card-bg); padding: 14px; border-radius: 12px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; box-shadow: var(--shadow); transition: background 0.3s, box-shadow 0.3s; }
    .filters label { font-size: 0.75rem; color: var(--text-light); display: block; margin-bottom: 4px; }
    .filters select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--input-bg); color: var(--text); transition: background 0.3s, border-color 0.3s; }
    .filters button { padding: 10px 16px; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
    .filters button:hover { opacity: 0.9; } .filters button:active { transform: scale(0.98); }  
  </style>
</head>
<body oncontextmenu="return false;">
<div class="header">
  <h1>🏦 Bank Muamalat</h1>
  <div class="meta"><b>Leading Indicator Dashboard</b></div>
  <div class="meta" id="selectedBranchDisplay">📍 <span id="branchNameText">Region Sumatera</span></div>
  <div class="meta">📅 Per: 21 Mei 2026 | 📆 Hari Kerja: 16</div>
  <button id="themeToggle" class="theme-toggle">🌙</button>
</div>
<div class="filters">
  <div><label>📍 Co-Branch</label> 
  <select id="coBranchFilter" class="custom-select">
    <option value="ALL">Semua Co-Branch</option><option value="BANDA ACEH">BANDA ACEH</option><option value="BENGKULU">BENGKULU</option><option value="LAMPUNG">LAMPUNG</option><option value="MEDAN BALAIKOTA">MEDAN BALAIKOTA</option><option value="MEDAN BARU">MEDAN BARU</option><option value="PADANG">PADANG</option><option value="PALEMBANG">PALEMBANG</option><option value="PANGKAL PINANG">PANGKAL PINANG</option><option value="PEKANBARU">PEKANBARU</option>
  </select>  
  </div>
  <div><label>🏢 Branch</label>
  <select id="branchFilter" class="custom-select">
    <option value="ALL">Semua Branch</option>
  </select>
  </div>
</div>
